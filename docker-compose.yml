version: "3.9"

services:
  trt-technikjeopardy:
    build: .
    container_name: trt-technikjeopardy
    volumes:
      - trt_jeopardy_db:/app/data
    ports:
      - "5050:5000"
    environment:
      - FLASK_DEBUG=0
      - PORT=5000
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=bitte-aendern
    restart: unless-stopped

volumes:
  trt_jeopardy_db:
