<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Frage bearbeiten - Technik-Jeopardy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body class="bg">
  <header class="header">
    <h1>Frage bearbeiten</h1>
    <p><a href="{{ url_for('admin') }}" class="link">Zurueck zur Uebersicht</a></p>
  </header>
  <main class="main">
    <form method="post" class="form">
      <label>Kategorie
        <select name="category_id" required>
          {% for c in categories %}
          <option value="{{ c.id }}" {% if c.id == question['category_id'] %}selected{% endif %}>
            {{ c.name }}
          </option>
          {% endfor %}
        </select>
      </label>
      <label>Punkte
        <input type="number" name="points" value="{{ question['points'] }}" required>
      </label>
      <label>Fragentext
        <textarea name="question_text" required>{{ question['question_text'] }}</textarea>
      </label>
      <label>Antworttext
        <textarea name="answer_text" required>{{ question['answer_text'] }}</textarea>
      </label>
      <label>Klassenstufe
        <input type="text" name="grade_level" value="{{ question['grade_level'] }}">
      </label>
      <label>Kompetenzbereich
        <input type="text" name="competence_area" value="{{ question['competence_area'] }}">
      </label>
      <label>Hinweis (optional)
        <textarea name="hint">{{ question['hint'] }}</textarea>
      </label>
      <button class="btn-primary" type="submit">Speichern</button>
    </form>
  </main>
</body>
</html>
