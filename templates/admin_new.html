<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Neue Frage - Technik-Jeopardy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body class="bg">
  <header class="header">
    <h1>Neue Frage anlegen</h1>
    <p><a href="{{ url_for('admin') }}" class="link">Zurueck zur Uebersicht</a></p>
  </header>
  <main class="main">
    <form method="post" class="form">
      <label>Kategorie
        <select name="category_id" required>
          {% for c in categories %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Punkte
        <input type="number" name="points" value="100" required>
      </label>
      <label>Fragentext
        <textarea name="question_text" required></textarea>
      </label>
      <label>Antworttext
        <textarea name="answer_text" required></textarea>
      </label>
      <label>Klassenstufe
        <input type="text" name="grade_level" placeholder="z.B. 7">
      </label>
      <label>Kompetenzbereich
        <input type="text" name="competence_area" placeholder="z.B. 3.3.1 Werkstoffe und Produkte">
      </label>
      <label>Hinweis (optional)
        <textarea name="hint"></textarea>
      </label>
      <button class="btn-primary" type="submit">Speichern</button>
    </form>
  </main>
</body>
</html>
